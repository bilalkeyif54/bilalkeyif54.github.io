<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team - Pack Opener</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #0c1020;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .pack-btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: #000;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }
        .pack-btn:hover {
            transform: scale(1.05);
        }
        .card-display {
            margin: 30px 0;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* UT Kartendesign */
        .ut-card {
            background: linear-gradient(135deg, #ffe066, #f5b041, #cb4335);
            border: 4px solid #fff;
            border-radius: 15px;
            width: 180px;
            height: 260px;
            position: relative;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            font-family: Arial, sans-serif;
            animation: walkout 0.8s ease-out;
        }
        @keyframes walkout {
            0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .rating {
            font-size: 32px;
            font-weight: bold;
            position: absolute;
            top: 15px;
            left: 15px;
        }
        .position {
            font-size: 14px;
            position: absolute;
            top: 50px;
            left: 15px;
            font-weight: bold;
        }
        .player-name {
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            position: absolute;
            top: 140px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.2);
            padding: 2px 0;
        }
        .stats {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }
        .my-squad {
            margin-top: 40px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
        }
        .squad-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FC 26 ULTIMATE TEAM ⚽</h1>
        <p>Öffne Gold-Packs und baue dein Traum-Team auf!</p>
        
        <button class="pack-btn" onclick="openPack()">GOLD PACK ÖFFNEN 🎒</button>

        <div class="card-display" id="cardDisplay">
            <p style="color: #666;">Klicke auf den Button, um ein Pack zu ziehen...</p>
        </div>

        <div class="my-squad">
            <h2>Mein Verein (<span id="count">0</span> Spieler)</h2>
            <div class="squad-list" id="squadList"></div>
        </div>
    </div>

    <script>
        // Datenbank mit Spielern (Du kannst hier beliebig viele hinzufügen!)
        const players = [
            { name: "Mbappé", rating: 91, pos: "ST", pac: 97, sho: 90, pas: 80, dri: 92 },
            { name: "Haaland", rating: 91, pos: "ST", pac: 89, sho: 93, pas: 66, dri: 80 },
            { name: "Bellingham", rating: 90, pos: "ZOM", pac: 80, sho: 86, pas: 83, dri: 88 },
            { name: "Vini Jr.", rating: 89, pos: "LF", pac: 95, sho: 84, pas: 78, dri: 91 },
            { name: "Musiala", rating: 87, pos: "ZOM", pac: 85, sho: 80, pas: 84, dri: 90 },
            { name: "Wirtz", rating: 87, pos: "ZOM", pac: 82, sho: 79, pas: 87, dri: 89 },
            { name: "Kane", rating: 90, pos: "ST", pac: 69, sho: 93, pas: 84, dri: 83 }
        ];

        let myClub = [];

        function openPack() {
            // Zufälligen Spieler auswählen
            const randomIndex = Math.floor(Math.random() * players.length);
            const player = players[randomIndex];

            // Karte im Interface anzeigen
            const display = document.getElementById("cardDisplay");
            display.innerHTML = `
                <div class="ut-card">
                    <div class="rating">${player.rating}</div>
                    <div class="position">${player.pos}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="stats">
                        <div>PAC: ${player.pac}</div>
                        <div>SHO: ${player.sho}</div>
                        <div>PAS: ${player.pas}</div>
                        <div>DRI: ${player.dri}</div>
                    </div>
                </div>
            `;

            // Zum Verein hinzufügen
            myClub.push(player);
            updateClubView();
        }

        function updateClubView() {
            document.getElementById("count").innerText = myClub.length;
            const list = document.getElementById("squadList");
            list.innerHTML = "";

            // Alle gesammelten Spieler auflisten
            myClub.forEach(player => {
                const item = document.createElement("div");
                item.style.background = "#fff";
                item.style.color = "#000";
                item.style.padding = "5px 10px";
                item.style.borderRadius = "5px";
                item.style.fontSize = "14px";
                item.style.fontWeight = "bold";
                item.innerText = `${player.name} (${player.rating})`;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
